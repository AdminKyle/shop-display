<body>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============ localStorage shim (matches artifact API) ============ */
const storage = {
  get: async (k) => {
    const v = localStorage.getItem(k);
    return v === null ? null : { value: v };
  },
  set: async (k, v) => localStorage.setItem(k, v),
  delete: async (k) => localStorage.removeItem(k),
};

/* ============ icons ============ */

  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" className={className}>
    {children || <path d={d} />}
  </svg>
);

/* ============ themes ============ */
const THEMES = {
  ink: { name: "Ink", bg: "radial-gradient(ellipse at top, #1a1a1a 0%, #000 100%)", fg: "#fafaf9", sub: "rgba(250,250,249,0.55)", accent: "#d4a574", qrBg: "#ffffff", qrFg: "000000", serif: true, swatch: "linear-gradient(135deg,#000 50%,#d4a574 50%)" },
  boutique: { name: "Boutique", bg: "radial-gradient(ellipse at top, #f7f1e6 0%, #ebe0c8 100%)", fg: "#2a1f17", sub: "rgba(42,31,23,0.6)", accent: "#a85234", qrBg: "#2a1f17", qrFg: "f7f1e6", serif: true, swatch: "linear-gradient(135deg,#f7f1e6 50%,#a85234 50%)" },
  neon: { name: "Neon", bg: "radial-gradient(circle at 30% 20%, #1a0033 0%, #0a0a14 60%, #000 100%)", fg: "#ffffff", sub: "rgba(255,255,255,0.6)", accent: "#ff2e93", qrBg: "#ffffff", qrFg: "0a0a14", serif: false, swatch: "linear-gradient(135deg,#0a0a14 50%,#ff2e93 50%)" },
  sunburst: { name: "Sunburst", bg: "radial-gradient(circle at 50% 30%, #ffd84d 0%, #ff8c42 100%)", fg: "#1a1340", sub: "rgba(26,19,64,0.65)", accent: "#1a1340", qrBg: "#1a1340", qrFg: "ffd84d", serif: false, swatch: "linear-gradient(135deg,#ffd84d 50%,#1a1340 50%)" },
};

const DEFAULT_CONFIG = {
  handle: "", shopName: "", tagline: "Follow us on Instagram", theme: "ink",
  countEnabled: false, manualCount: 0, endpoint: "", intervalMin: 1,
};

/* ============ root ============ */
function App() {
  const [view, setView] = useState("loading");
  const [step, setStep] = useState(0);
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [editConfig, setEditConfig] = useState(DEFAULT_CONFIG);

  useEffect(() => {
    (async () => {
      try {
        const onboarded = await storage.get("onboarded");
        const saved = await storage.get("config");
        if (saved?.value) {
          const parsed = { ...DEFAULT_CONFIG, ...JSON.parse(saved.value) };
          setConfig(parsed); setEditConfig(parsed);
        }
        setView(onboarded?.value === "true" ? "display" : "onboard");
      } catch { setView("onboard"); }
    })();
  }, []);

  const saveConfig = async (next) => {
    setConfig(next);
    try { await storage.set("config", JSON.stringify(next)); } catch {}
  };

  const finishOnboarding = async () => {
    await saveConfig(editConfig);
    try { await storage.set("onboarded", "true"); } catch {}
    setView("display");
  };

  const resetAll = async () => {
    try { await storage.delete("config"); await storage.delete("onboarded"); } catch {}
    setConfig(DEFAULT_CONFIG); setEditConfig(DEFAULT_CONFIG);
    setStep(0); setView("onboard");
  };

  const theme = THEMES[config.theme] || THEMES.ink;

  useEffect(() => {
    document.body.style.background = theme.bg;
    document.documentElement.style.background = theme.bg;
    
    // Extract the last color from the gradient (e.g. "#000") to use for the safe area theme-color
    const match = theme.bg.match(/(#[a-fA-F0-9]{3,6})\s*100%\)/);
    const color = match ? match[1] : "#000000";
    
    let metaTheme = document.querySelector('meta[name="theme-color"]');
    if (!metaTheme) {
      metaTheme = document.createElement('meta');
      metaTheme.name = "theme-color";
      document.head.appendChild(metaTheme);
    }
    metaTheme.content = color;
  }, [theme.bg]);

  return (
    <div className="h-full w-full flex items-center justify-center relative overflow-hidden"
         style={{ background: theme.bg, color: theme.fg, paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)" }}>
      {view === "loading" && <div className="text-sm opacity-50" style={{ fontFamily: "Inter, sans-serif" }}>Loading…</div>}
      {view === "onboard" && <Onboarding step={step} setStep={setStep} editConfig={editConfig} setEditConfig={setEditConfig} finish={finishOnboarding} />}
      {view === "display" && <Display config={config} theme={theme} openSettings={() => { setEditConfig(config); setView("settings"); }} openHelp={() => setView("help")} />}
      {view === "settings" && <SettingsPanel editConfig={editConfig} setEditConfig={setEditConfig} save={async () => { await saveConfig(editConfig); setView("display"); }} cancel={() => setView("display")} reset={resetAll} />}
      {view === "help" && <Help close={() => setView("display")} />}
    </div>
  );
}

/* ============ onboarding ============ */
function Onboarding({ step, setStep, editConfig, setEditConfig, finish }) {
  const steps = [
    { title: "Welcome", body: <WelcomeStep /> },
    { title: "Your account", body: <HandleStep editConfig={editConfig} setEditConfig={setEditConfig} /> },
    { title: "Your message", body: <MessageStep editConfig={editConfig} setEditConfig={setEditConfig} /> },
    { title: "Pick a look", body: <ThemeStep editConfig={editConfig} setEditConfig={setEditConfig} /> },
  ];
  const canAdvance = () => step === 1 ? editConfig.handle.trim().length > 0 : true;

  return (
    <div className="w-full max-w-lg px-6 py-10 relative z-10" style={{ fontFamily: "Inter, sans-serif" }}>
      <div className="flex gap-1.5 mb-10">
        {steps.map((_, i) => (
          <div key={i} className="flex-1 h-0.5 rounded-full transition-all duration-500" style={{ background: "currentColor", opacity: i <= step ? 1 : 0.15 }} />
        ))}
      </div>
      <div className="text-[10px] tracking-[0.35em] uppercase mb-3 opacity-50" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
        Step {step + 1} of {steps.length} — {steps[step].title}
      </div>
      <div className="mb-10 min-h-[260px]">{steps[step].body}</div>
      <div className="flex gap-3">
        {step > 0 && (
          <button onClick={() => setStep(step - 1)} className="px-6 h-12 rounded-full border border-current/30 hover:bg-current/5 transition text-xs tracking-[0.2em] uppercase">Back</button>
        )}
        <button disabled={!canAdvance()} onClick={() => step === steps.length - 1 ? finish() : setStep(step + 1)}
          className="flex-1 h-12 rounded-full text-xs tracking-[0.2em] uppercase font-medium flex items-center justify-center gap-2 transition disabled:opacity-30"
          style={{ background: "currentColor" }}>
          <span style={{ filter: "invert(1) grayscale(1) contrast(100)" }}>{step === steps.length - 1 ? "Launch display" : "Continue"}</span>
        </button>
      </div>
    </div>
  );
}

      <p className="text-sm leading-relaxed opacity-70 max-w-md">

function ThemeStep({ editConfig, setEditConfig }) {
  return (

      <div className="grid grid-cols-2 gap-3">

                  <IconCheck size={14} sw={2.5} />

/* ============ live counter ============ */
function useLiveCount(config) {
  const [count, setCount] = useState(config.manualCount || 0);
  const [displayCount, setDisplayCount] = useState(config.manualCount || 0);
  const [online, setOnline] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [error, setError] = useState("");
  const pollRef = useRef(null);
  const animRef = useRef(null);

  const fetchCount = async (endpoint) => {
    if (!endpoint) return;
    try {
      const url = endpoint.includes('?') ? endpoint : `${endpoint}?handle=${config.handle}`;
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const d = await r.json();
      const n = typeof d === "number" ? d : d.count ?? d.followers ?? d.followers_count;
      if (typeof n !== "number") throw new Error("No count field");
      setCount(n); setOnline(true); setError(""); setLastSync(new Date());
    } catch (e) { setOnline(false); setError(e.message); }
  };

  useEffect(() => {
    clearInterval(pollRef.current);
    if (config.countEnabled && config.endpoint) {
      fetchCount(config.endpoint);
      pollRef.current = setInterval(() => fetchCount(config.endpoint), Math.max(1, config.intervalMin) * 60 * 1000);
    } else { setCount(config.manualCount || 0); setOnline(false); }
    return () => clearInterval(pollRef.current);
  }, [config.endpoint, config.intervalMin, config.countEnabled, config.manualCount]);

  useEffect(() => {
    const start = displayCount, end = count;
    if (start === end) return;
    const duration = 1200, t0 = performance.now();
    cancelAnimationFrame(animRef.current);
    const tick = (now) => {
      const t = Math.min(1, (now - t0) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplayCount(Math.round(start + (end - start) * eased));
      if (t < 1) animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(animRef.current);
  }, [count]);

  return { displayCount, online, lastSync, error };
}

/* ============ display ============ */
function Display({ config, theme, openSettings, openHelp }) {
  const url = `https://instagram.com/${encodeURIComponent(config.handle)}`;
  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(url)}&size=600x600&margin=20&color=${theme.qrFg}&bgcolor=${theme.qrBg.replace("#", "")}&qzone=2`;
  const live = useLiveCount(config);

  return (
    <div className="w-full h-screen flex items-center justify-center p-6 md:p-12 relative">
      <div className="absolute top-4 right-4 flex gap-2 z-20">
        <IconBtn onClick={openHelp} label="Help" theme={theme}><IconHelp size={16} sw={1.5} /></IconBtn>
        <IconBtn onClick={openSettings} label="Settings" theme={theme}><IconSettings size={16} sw={1.5} /></IconBtn>
      </div>

      {config.countEnabled && config.endpoint && (
        <div className="absolute top-4 left-4 flex items-center gap-2 px-3 py-1.5 rounded-full backdrop-blur-sm z-20" style={{ background: `${theme.fg}10` }}>
          {live.online ? (
            <>
              <span className="relative flex w-2 h-2">
                <span className="absolute inset-0 rounded-full animate-ping opacity-75" style={{ background: "#34d399" }} />
                <span className="relative rounded-full w-2 h-2" style={{ background: "#34d399" }} />
              </span>
              <span className="text-[10px] tracking-[0.2em] uppercase" style={{ color: theme.fg, opacity: 0.7 }}>Live</span>
            </>
          ) : (
            <>
              <IconWifiOff size={12} sw={2} className="text-amber-400" />
              <span className="text-[10px] tracking-[0.2em] uppercase" style={{ color: "#fbbf24" }}>Offline</span>
            </>
          )}
        </div>
      )}

      <div className="flex flex-col md:flex-row items-center gap-8 md:gap-16 max-w-5xl w-full">
        <div className="flex-1 text-center md:text-left">
          <div className="flex items-center justify-center md:justify-start gap-2 mb-5 text-xs tracking-[0.3em] uppercase" style={{ color: theme.sub, fontFamily: "'JetBrains Mono', monospace" }}>
            <IconInstagram size={14} sw={1.5} /> Instagram
          </div>
          {config.shopName && (
            <div className="text-sm tracking-[0.2em] uppercase mb-3" style={{ color: theme.sub, fontFamily: "Inter, sans-serif" }}>{config.shopName}</div>
          )}
          <h1 className="leading-[0.95] mb-5" style={{
            fontFamily: theme.serif ? "Fraunces, serif" : "Inter, sans-serif",
            fontWeight: theme.serif ? 400 : 600,
            fontSize: "clamp(2rem, 5vw, 4rem)",
            letterSpacing: theme.serif ? "-0.02em" : "-0.03em",
          }}>{config.tagline}</h1>
          <div className="inline-block text-xl md:text-2xl tracking-tight mb-6" style={{ color: theme.accent, fontFamily: "'JetBrains Mono', monospace", fontWeight: 500 }}>@{config.handle}</div>

          {config.countEnabled && (
            <div className="pt-6 mt-2" style={{ borderTop: `1px solid ${theme.fg}15` }}>
              <div className="leading-none tabular-nums tracking-tight" style={{
                fontFamily: theme.serif ? "Fraunces, serif" : "Inter, sans-serif",
                fontWeight: theme.serif ? 400 : 700,
                fontSize: "clamp(2.5rem, 6vw, 5rem)",
                color: theme.fg,
                fontVariationSettings: theme.serif ? "'opsz' 144" : undefined,
              }}>{live.displayCount.toLocaleString()}</div>
              <div className="mt-2 text-[10px] tracking-[0.4em] uppercase" style={{ color: theme.sub, fontFamily: "'JetBrains Mono', monospace" }}>
                Followers
                {live.lastSync && live.online && (
                  <span className="ml-2 opacity-60">· synced {live.lastSync.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>
                )}
              </div>
            </div>
          )}
        </div>

        <div className="flex flex-col items-center">
          <div className="p-4 rounded-2xl" style={{ background: theme.qrBg, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
            <img src={qrSrc} alt={`QR to @${config.handle}`} className="w-48 h-48 md:w-64 md:h-64 block" />
          </div>
          <div className="mt-4 text-[10px] tracking-[0.3em] uppercase" style={{ color: theme.sub, fontFamily: "'JetBrains Mono', monospace" }}>Scan with camera</div>
        </div>
      </div>
    </div>
  );
}

function IconBtn({ children, onClick, label, theme }) {
  return (
    <button onClick={onClick} aria-label={label}
      className="w-10 h-10 rounded-full backdrop-blur-sm flex items-center justify-center transition active:scale-95"
      style={{ background: `${theme.fg}15`, color: theme.fg }}>{children}</button>
  );
}

/* ============ settings ============ */
function SettingsPanel({ editConfig, setEditConfig, save, cancel, reset }) {
  const [confirmReset, setConfirmReset] = useState(false);

  return (
    <div className="w-full max-w-lg px-6 py-10 relative z-10 overflow-y-auto max-h-screen" style={{ fontFamily: "Inter, sans-serif" }}>
      <div className="text-[10px] tracking-[0.4em] uppercase mb-8 opacity-50 text-center" style={{ fontFamily: "'JetBrains Mono', monospace" }}>— Settings —</div>

      <Label>Instagram handle</Label>
      <div className="flex items-center border-b border-current/30 pb-2 mb-6 focus-within:border-current transition">
        <span className="text-xl mr-1 opacity-50">@</span>
        <input value={editConfig.handle} onChange={(e) => setEditConfig({ ...editConfig, handle: e.target.value.replace(/^@/, "").trim() })} className="flex-1 bg-transparent outline-none text-xl" />
      </div>
      <Label>Shop name</Label>
      <div className="border-b border-current/30 pb-2 mb-6 focus-within:border-current transition">
        <input value={editConfig.shopName} onChange={(e) => setEditConfig({ ...editConfig, shopName: e.target.value })} className="w-full bg-transparent outline-none text-lg" />
      </div>
      <Label>Headline</Label>
      <div className="border-b border-current/30 pb-2 mb-6 focus-within:border-current transition">
        <input value={editConfig.tagline} onChange={(e) => setEditConfig({ ...editConfig, tagline: e.target.value })} className="w-full bg-transparent outline-none text-lg" />
      </div>
      <Label>Theme</Label>
      <div className="grid grid-cols-4 gap-2 mb-8">
        {Object.entries(THEMES).map(([key, t]) => {
          const sel = editConfig.theme === key;
          return (
            <button key={key} onClick={() => setEditConfig({ ...editConfig, theme: key })}
              className={`aspect-square rounded-lg transition relative ${sel ? "ring-2 ring-current scale-[0.95]" : "ring-1 ring-current/15"}`}
              style={{ background: t.swatch }} title={t.name}>
              {sel && <IconCheck size={16} sw={2.5} className="absolute top-1 right-1" />}
            </button>
          );
        })}
      </div>

      <div className="rounded-2xl p-4 mb-6" style={{ background: "currentColor" }}>
        <div style={{ filter: "invert(1) grayscale(1) contrast(100)" }}>
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2">
              <IconActivity size={16} sw={1.5} />
              <span className="text-sm font-medium">Live follower counter</span>
            </div>
            <Toggle checked={editConfig.countEnabled} onChange={(v) => setEditConfig({ ...editConfig, countEnabled: v })} />
          </div>
          {editConfig.countEnabled && (
            <>
              <div className="text-[10px] tracking-[0.25em] uppercase opacity-50 mb-2 mt-4" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                API endpoint (returns JSON like {`{"count":1234}`})
              </div>
              <div className="border-b border-current/30 pb-2 mb-4 focus-within:border-current transition">
                <input value={editConfig.endpoint} onChange={(e) => setEditConfig({ ...editConfig, endpoint: e.target.value })} className="w-full bg-transparent outline-none text-sm" placeholder="https://your-project.vercel.app/api/followers" />
              </div>
              <div className="text-[10px] tracking-[0.25em] uppercase opacity-50 mb-2" style={{ fontFamily: "'JetBrains Mono', monospace" }}>Refresh every (minutes)</div>
              <div className="border-b border-current/30 pb-2 mb-4 focus-within:border-current transition">
                <input type="text" inputMode="numeric" value={editConfig.intervalMin}
                  onChange={(e) => setEditConfig({ ...editConfig, intervalMin: parseInt(e.target.value.replace(/[^0-9]/g, ""), 10) || 1 })}
                  className="w-full bg-transparent outline-none text-lg tabular-nums" />
              </div>
              <div className="text-[10px] tracking-[0.25em] uppercase opacity-50 mb-2" style={{ fontFamily: "'JetBrains Mono', monospace" }}>Fallback count (shown if endpoint fails)</div>
              <div className="border-b border-current/30 pb-2 focus-within:border-current transition">
                <input type="text" inputMode="numeric" value={editConfig.manualCount}
                  onChange={(e) => setEditConfig({ ...editConfig, manualCount: parseInt(e.target.value.replace(/[^0-9]/g, ""), 10) || 0 })}
                  className="w-full bg-transparent outline-none text-lg tabular-nums" />
              </div>
            </>
          )}
        </div>
      </div>

      <div className="flex gap-3 mb-4">
        <button onClick={cancel} className="flex-1 h-12 rounded-full border border-current/30 hover:bg-current/5 transition flex items-center justify-center gap-2 text-xs tracking-[0.2em] uppercase">
          <IconX size={14} sw={1.5} /> Cancel
        </button>
        <button onClick={save} className="flex-1 h-12 rounded-full text-xs tracking-[0.2em] uppercase font-medium flex items-center justify-center gap-2" style={{ background: "currentColor" }}>
          <span style={{ filter: "invert(1) grayscale(1) contrast(100)" }} className="flex items-center gap-2"><IconCheck size={14} sw={2} /> Save</span>
        </button>
      </div>

      {!confirmReset ? (
        <button onClick={() => setConfirmReset(true)} className="w-full text-[11px] tracking-[0.2em] uppercase opacity-40 hover:opacity-70 transition py-2 flex items-center justify-center gap-2">
          <IconReset size={12} sw={1.5} /> Reset everything
        </button>
      ) : (
        <div className="flex gap-2 items-center justify-center text-[11px] tracking-[0.15em] uppercase opacity-80 py-2">
          <span className="opacity-60">Reset all settings?</span>
          <button onClick={reset} className="underline">Yes, reset</button>
          <span className="opacity-40">·</span>
          <button onClick={() => setConfirmReset(false)} className="opacity-60">No</button>
        </div>
      )}
    </div>
  );
}

function Toggle({ checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)} className="relative w-11 h-6 rounded-full transition"
      style={{ background: checked ? "currentColor" : "rgba(127,127,127,0.3)" }}>
      <span className="absolute top-0.5 w-5 h-5 rounded-full transition-all"
        style={{ left: checked ? "calc(100% - 1.375rem)" : "0.125rem", background: "white", filter: checked ? "invert(1)" : "none" }} />
    </button>
  );
}

/* ============ help ============ */
function Help({ close }) {
  const tips = [
    { icon: <IconQR size={20} sw={1.3} />, title: "How customers use it", body: "They open their phone camera and point it at the QR code. A notification appears — tapping it opens your Instagram profile." },
    { icon: <IconSettings size={20} sw={1.3} />, title: "Change anything later", body: "Tap the gear icon top-right to edit your handle, headline, theme, or live counter setup. Changes save automatically." },
    { icon: <IconActivity size={20} sw={1.3} />, title: "Live follower counter", body: "Toggle on in settings, paste your Vercel endpoint URL, set a refresh interval. A green pulse means live; amber means offline (fallback count shows)." },
    { icon: <IconPalette size={20} sw={1.3} />, title: "Four themes", body: "Ink for refined, Boutique for warm, Neon for bold, Sunburst for playful. QR colours adapt automatically." },
    { icon: <IconType size={20} sw={1.3} />, title: "Best on iPad", body: "Open in Safari → Share → 'Add to Home Screen'. Launch from the home icon for true fullscreen with no browser bars." },
  ];

  return (
    <div className="w-full max-w-lg px-6 py-10 relative z-10 overflow-y-auto max-h-screen" style={{ fontFamily: "Inter, sans-serif" }}>
      <button onClick={close} className="absolute top-4 right-4 w-10 h-10 rounded-full hover:bg-current/10 transition flex items-center justify-center">
        <IconX size={16} sw={1.5} />
      </button>
      <div className="text-[10px] tracking-[0.4em] uppercase mb-8 opacity-50 text-center" style={{ fontFamily: "'JetBrains Mono', monospace" }}>— How it works —</div>
      <div className="space-y-6">
        {tips.map((tip, i) => (
          <div key={i} className="flex gap-4">
            <div className="flex-shrink-0 w-10 h-10 rounded-full border border-current/20 flex items-center justify-center mt-0.5">{tip.icon}</div>
            <div>
              <div className="text-base mb-1" style={{ fontFamily: "Fraunces, serif", fontWeight: 500 }}>{tip.title}</div>
              <div className="text-sm leading-relaxed opacity-70">{tip.body}</div>
            </div>
          </div>
        ))}
      </div>
      <button onClick={close} className="w-full mt-10 h-12 rounded-full text-xs tracking-[0.2em] uppercase font-medium" style={{ background: "currentColor" }}>
        <span style={{ filter: "invert(1) grayscale(1) contrast(100)" }}>Got it</span>
      </button>
    </div>
  );
}

function Label({ children }) {
  return <div className="text-[10px] tracking-[0.25em] uppercase opacity-50 mb-2" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
